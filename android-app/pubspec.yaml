name: smart_price_ai
description: AI 拍照识物与智能比价购物助手
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  # image_picker 降级到 0.8.9：
  # 1.x 版本依赖的 flutter_plugin_android_lifecycle 要求 Android SDK 35，
  # 但当前 Android Studio JBR 的 jlink 与 SDK 35 的 core-for-system-modules.jar 不兼容。
  # 降级后使用 SDK 34 编译，规避 JdkImageTransform 失败问题。
  image_picker: ^0.8.9
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
